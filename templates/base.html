<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Flask Auth App</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 500px; margin: 60px auto; padding: 20px; }
        input { width: 100%; padding: 10px; margin: 8px 0; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #4CAF50; color: white; border: none; cursor: pointer; }
        .alert-danger { color: red; } .alert-success { color: green; } .alert-info { color: blue; }
        a { color: #4CAF50; }
    </style>
</head>
<body>
    {% with messages = get_flashed_messages(with_categories=true) %}
        {% for category, message in messages %}
            <p class="alert-{{ category }}">{{ message }}</p>
        {% endfor %}
    {% endwith %}
    {% block content %}{% endblock %}
</body>
</html>
